<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camp Fly — Media 2023</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: rgba(255,255,255,0.9); margin: 0; padding: 0; min-height: 100vh; position: relative; }
    .bg-texture-overlay { position: absolute; inset: 0; z-index: 0; background-image: url("bg-texture.png"); background-repeat: repeat; pointer-events: none; }
    .dragonfly-bg { position: absolute; top: 7.5rem; left: 0; right: 0; bottom: 0; z-index: 1; pointer-events: none; }
    .dragonfly-bg img { width: 100%; height: 100%; object-fit: contain; object-position: top center; filter: invert(1); opacity: 0.2; }
    .content-layer { position: relative; z-index: 1; }
    .banner { position: relative; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); background: #0f0f0f; background-image: url("bg-texture.png"); background-repeat: repeat; overflow: hidden; }
    .banner a { display: flex; align-items: center; justify-content: center; padding: 0.75rem 0 1rem; text-decoration: none; color: inherit; }
    .banner-words { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 50vw; max-width: 480px; }
    .banner-words img { width: 45%; height: auto; object-fit: contain; }
    .navbar { background: rgba(15,15,15,0.98); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0.75rem 1rem; }
    .navbar-inner { max-width: 896px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    .navbar-links { display: flex; gap: 1.5rem; }
    .navbar-links a { color: rgba(255,255,255,0.9); text-decoration: none; font-weight: 500; }
    .navbar-links a:hover { color: #fff; text-decoration: underline; }
    .container { max-width: 896px; margin: 0 auto; padding: 2rem 1rem 3rem; }
    .back-link { display: inline-block; margin-bottom: 1rem; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9375rem; }
    .back-link:hover { color: #fff; text-decoration: underline; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin: 0 0 1.5rem; text-align: center; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; list-style: none; padding: 0; margin: 0; }
    .photo-grid li { margin: 0; cursor: pointer; }
    .photo-grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; display: block; background: rgba(31,31,31,0.8); }
    .lightbox { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 2rem 4rem; overflow-y: auto; flex-direction: column; }
    .lightbox.open { display: flex; }
    .lightbox-backdrop { position: fixed; inset: 0; cursor: pointer; }
    .lightbox-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
    .lightbox-content { position: relative; max-width: 100%; max-height: 70vh; display: flex; align-items: center; justify-content: center; }
    .lightbox-content img { max-width: 100%; max-height: calc(100vh - 8rem); width: auto; height: auto; object-fit: contain; }
    .lightbox-close { position: absolute; top: -2.5rem; right: 0; background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.9375rem; }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }
    .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; }
    .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.25); }
    .lightbox-prev { left: -4rem; }
    .lightbox-next { right: -4rem; }
    .lightbox-counter { position: absolute; bottom: -2rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-size: 0.875rem; }
    .lightbox-comments { width: 100%; max-width: 480px; margin: 2rem auto 0; padding: 1rem; background: rgba(31,31,31,0.9); border-radius: 12px; max-height: 220px; display: flex; flex-direction: column; }
    .lightbox-comments h3 { font-size: 0.9375rem; margin: 0 0 0.75rem; color: #fff; }
    .lightbox-comments-list { flex: 1; overflow-y: auto; margin-bottom: 0.75rem; font-size: 0.875rem; }
    .lightbox-comment { padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .lightbox-comment:last-child { border-bottom: none; }
    .lightbox-comment strong { color: rgba(255,255,255,0.95); }
    .lightbox-comment span { color: rgba(255,255,255,0.6); font-size: 0.75rem; }
    .lightbox-comments-form label { display: block; font-size: 0.8125rem; margin-bottom: 0.25rem; color: rgba(255,255,255,0.8); }
    .lightbox-comments-form input[type="text"], .lightbox-comments-form textarea { width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; font-size: 0.875rem; background: rgba(15,15,15,0.8); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; box-sizing: border-box; }
    .lightbox-comments-form textarea { min-height: 60px; resize: vertical; }
    .lightbox-comments-form button { padding: 0.5rem 1rem; font-size: 0.875rem; background: #fff; color: #0f0f0f; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .lightbox-comments-form button:hover { background: rgba(255,255,255,0.9); }
    .lightbox-comments-form .comment-error { font-size: 0.8125rem; color: #f87171; margin-bottom: 0.5rem; }
    .lightbox-comments-empty { color: rgba(255,255,255,0.5); font-size: 0.875rem; padding: 0.5rem 0; }
    .footer { border-top: 1px solid rgba(255,255,255,0.1); background: rgba(31,31,31,0.95); padding: 1.25rem 1rem; margin-top: 2rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 0.75rem; font-size: 0.875rem; color: rgba(255,255,255,0.7); }
    .footer img { height: 28px; width: auto; opacity: 0.8; filter: invert(1); }
  </style>
</head>
<body>
  <div class="dragonfly-bg" aria-hidden="true"><img src="logo/dragonfly-bg.png" alt=""></div>
  <div class="bg-texture-overlay" aria-hidden="true"></div>
  <div class="content-layer">
  <header class="banner" role="banner">
    <a href="Camp-Fly-Home-Preview.html" aria-label="Camp Fly home">
      <span class="banner-words">
        <img src="logo/banner-camp.png" alt="Camp">
        <img src="logo/banner-fly.png" alt="Fly">
      </span>
    </a>
  </header>
  <header class="navbar">
    <div class="navbar-inner">
      <nav class="navbar-links">
        <a href="Camp-Fly-Home-Preview.html">Home</a>
        <a href="Camp-Fly-Preview.html">Burgin Initiation</a>
        <a href="Camp-Fly-Media-Preview.html">Media</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <a href="Camp-Fly-Media-Preview.html" class="back-link">← Back to media</a>
    <h1>2023</h1>
    <ul class="photo-grid" id="photo-grid"></ul>
  </div>
  <footer class="footer">
    <img src="logo/dragonfly-only.png" alt="">
    <p style="margin:0;">Camp Fly @ Burning Man</p>
  </footer>
  </div>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <div class="lightbox-backdrop" id="lightbox-backdrop" aria-label="Close"></div>
    <div class="lightbox-inner">
      <div class="lightbox-content">
        <button type="button" class="lightbox-prev" id="lightbox-prev" aria-label="Previous photo">‹</button>
        <img id="lightbox-img" src="" alt="">
        <button type="button" class="lightbox-next" id="lightbox-next" aria-label="Next photo">›</button>
        <button type="button" class="lightbox-close" id="lightbox-close">← Back to grid</button>
        <span class="lightbox-counter" id="lightbox-counter"></span>
      </div>
      <div class="lightbox-comments" id="lightbox-comments">
        <h3>Comments</h3>
        <div class="lightbox-comments-list" id="lightbox-comments-list"></div>
        <form class="lightbox-comments-form" id="lightbox-comments-form">
          <div class="comment-error" id="comment-error" style="display:none;"></div>
          <label for="comment-name">Your name (required)</label>
          <input type="text" id="comment-name" placeholder="Name" required maxlength="100" autocomplete="name">
          <label for="comment-text">Comment</label>
          <textarea id="comment-text" placeholder="Add a comment..." maxlength="2000" rows="2"></textarea>
          <button type="submit">Post comment</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var year = "2023";
      var SUPABASE_URL = 'https://yjglsncnpwnttfntrkdn.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqZ2xzbmNucHdudHRmbnRya2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDAwNzQsImV4cCI6MjA4Nzk3NjA3NH0.YF7bCwNCZlN_4jjmozhcfw_sfjzGlLA_EVkbLYRcPYs';
      var images = ["IMG_5786.JPG", "IMG_5792.JPG", "IMG_5793.JPG", "IMG_5794.JPG", "IMG_5795.JPG", "IMG_5796.JPG", "IMG_5797.JPG", "IMG_5798.JPG", "IMG_5799.JPG", "IMG_5800.JPG", "IMG_5801.JPG", "IMG_5802.JPG", "IMG_5803.JPG", "IMG_5804.JPG", "IMG_5805.JPG", "IMG_5806.JPG", "IMG_5807.JPG", "IMG_5808.JPG", "IMG_5809.JPG", "IMG_5810.JPG", "IMG_5811.JPG", "IMG_5813.JPG", "IMG_5814.JPG", "IMG_5815.JPG", "IMG_5816.JPG", "IMG_5817.JPG", "IMG_5818.JPG", "IMG_5819.JPG", "IMG_5820.JPG", "IMG_5821.JPG", "IMG_5822.JPG", "IMG_5823.JPG", "IMG_5824.JPG", "IMG_5825.JPG", "IMG_5826.JPG", "IMG_5827.JPG", "IMG_5828.JPG", "IMG_5829.JPG", "IMG_5830.JPG", "IMG_5831.JPG", "IMG_5832.JPG", "IMG_5833.JPG", "IMG_5835.JPG", "IMG_5836.JPG", "IMG_5837.JPG", "IMG_5839.JPG", "IMG_5840.JPG", "IMG_5841.JPG", "IMG_5842.JPG", "IMG_5843.JPG", "IMG_5844.JPG", "IMG_5845.JPG", "IMG_5846.JPG", "IMG_5847.JPG", "IMG_5848.JPG", "IMG_5849.JPG", "IMG_5850.JPG", "IMG_5851.JPG", "IMG_5852.JPG", "IMG_5853.JPG", "IMG_5854.JPG", "IMG_5855.JPG", "IMG_5856.JPG", "IMG_5857.JPG", "IMG_5858.JPG", "IMG_5859.JPG", "IMG_5860.JPG", "IMG_5861.JPG", "IMG_5862.JPG", "IMG_5863.JPG", "IMG_5864.JPG", "IMG_5865.JPG", "IMG_5866.JPG", "IMG_5867.JPG", "IMG_5868.JPG", "IMG_5869.JPG", "IMG_5870.JPG", "IMG_5871.JPG", "IMG_5872.JPG", "IMG_5873.JPG", "IMG_5874.JPG", "IMG_5875.JPG", "IMG_5876.JPG", "IMG_5877.JPG", "IMG_5878.JPG", "IMG_5879.JPG", "IMG_5880.JPG", "IMG_5881.JPG", "IMG_5882.JPG", "IMG_5883.JPG", "IMG_5884.JPG", "IMG_5885.JPG", "IMG_5886.JPG", "IMG_5887.JPG", "IMG_5888.JPG", "IMG_5889.JPG", "IMG_5890.JPG", "IMG_5891.JPG", "IMG_5892.JPG", "IMG_5893.JPG", "IMG_5894.JPG", "IMG_5895.JPG", "IMG_5896.JPG", "IMG_5897.JPG", "IMG_5898.JPG"];
      var grid = document.getElementById("photo-grid");
      var base = "photos/" + year + "/";
      var lightbox = document.getElementById("lightbox");
      var lightboxImg = document.getElementById("lightbox-img");
      var lightboxCounter = document.getElementById("lightbox-counter");
      var commentsList = document.getElementById("lightbox-comments-list");
      var commentsForm = document.getElementById("lightbox-comments-form");
      var commentName = document.getElementById("comment-name");
      var commentText = document.getElementById("comment-text");
      var commentError = document.getElementById("comment-error");
      var currentIndex = 0;
      var commentsEnabled = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

      images.forEach(function(name, i) {
        var li = document.createElement("li");
        var img = document.createElement("img");
        img.src = base + encodeURIComponent(name);
        img.alt = "";
        img.loading = "lazy";
        li.appendChild(img);
        li.setAttribute("data-index", i);
        grid.appendChild(li);
      });

      function showLightbox(index) {
        currentIndex = index;
        updateLightboxImage();
        lightbox.classList.add("open");
        document.body.style.overflow = "hidden";
        document.getElementById("lightbox-prev").focus();
        loadComments();
      }

      function hideLightbox() {
        lightbox.classList.remove("open");
        document.body.style.overflow = "";
      }

      function updateLightboxImage() {
        var name = images[currentIndex];
        lightboxImg.src = base + encodeURIComponent(name);
        lightboxCounter.textContent = (currentIndex + 1) + " / " + images.length;
        loadComments();
      }

      function loadComments() {
        if (!commentsEnabled) {
          commentsList.innerHTML = '<p class="lightbox-comments-empty">To enable comments, add your Supabase URL and anon key at the top of this page\'s script. See README-COMMENTS-SUPABASE.txt for setup.</p>';
          return;
        }
        var filename = images[currentIndex];
        var url = SUPABASE_URL + '/rest/v1/media_comments?year=eq.' + encodeURIComponent(year) + '&image_filename=eq.' + encodeURIComponent(filename) + '&order=created_at.asc';
        commentsList.innerHTML = '<p class="lightbox-comments-empty">Loading…</p>';
        fetch(url, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
        }).then(function(r) { return r.json(); })
          .then(function(data) {
            if (!data || data.length === 0) {
              commentsList.innerHTML = '<p class="lightbox-comments-empty">No comments yet. Be the first!</p>';
              return;
            }
            commentsList.innerHTML = data.map(function(c) {
              var d = c.created_at ? new Date(c.created_at).toLocaleDateString() : '';
              return '<div class="lightbox-comment"><strong>' + escapeHtml(c.author_name || '') + '</strong> <span>' + escapeHtml(d) + '</span><br>' + escapeHtml(c.comment_text || '') + '</div>';
            }).join('');
          })
          .catch(function() {
            commentsList.innerHTML = '<p class="lightbox-comments-empty">Could not load comments.</p>';
          });
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      if (commentsForm) {
        commentsForm.addEventListener('submit', function(e) {
          e.preventDefault();
          commentError.style.display = 'none';
          commentError.textContent = '';
          var name = (commentName && commentName.value) ? commentName.value.trim() : '';
          var text = (commentText && commentText.value) ? commentText.value.trim() : '';
          if (!name) {
            commentError.textContent = 'Please enter your name.';
            commentError.style.display = 'block';
            return;
          }
          if (!commentsEnabled) {
            commentError.textContent = 'Comments are not configured (Supabase).';
            commentError.style.display = 'block';
            return;
          }
          var payload = { year: year, image_filename: images[currentIndex], author_name: name, comment_text: text || '(no text)' };
          var postUrl = SUPABASE_URL + '/rest/v1/media_comments';
          fetch(postUrl, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation'
            },
            body: JSON.stringify(payload)
          }).then(function(r) {
            if (!r.ok) throw new Error('Post failed');
            commentText.value = '';
            loadComments();
          }).catch(function() {
            commentError.textContent = 'Failed to post comment. Try again.';
            commentError.style.display = 'block';
          });
        });
      }

      function goPrev() {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        updateLightboxImage();
      }

      function goNext() {
        currentIndex = (currentIndex + 1) % images.length;
        updateLightboxImage();
      }

      grid.addEventListener("click", function(e) {
        var li = e.target.closest("li[data-index]");
        if (li) {
          e.preventDefault();
          showLightbox(parseInt(li.getAttribute("data-index"), 10));
        }
      });

      document.getElementById("lightbox-backdrop").addEventListener("click", hideLightbox);
      document.getElementById("lightbox-close").addEventListener("click", hideLightbox);
      document.getElementById("lightbox-prev").addEventListener("click", function(e) { e.stopPropagation(); goPrev(); });
      document.getElementById("lightbox-next").addEventListener("click", function(e) { e.stopPropagation(); goNext(); });

      document.addEventListener("keydown", function(e) {
        if (!lightbox.classList.contains("open")) return;
        if (e.key === "Escape") hideLightbox();
        if (e.key === "ArrowLeft") goPrev();
        if (e.key === "ArrowRight") goNext();
      });
    })();
  </script>
</body>
</html>
