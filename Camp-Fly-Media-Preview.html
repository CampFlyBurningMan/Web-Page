<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camp Fly — Media (Preview)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0f0f0f;
      color: rgba(255,255,255,0.9);
      line-height: 1.6;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      position: relative;
    }
    .bg-texture-overlay {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: url("bg-texture.png");
      background-repeat: repeat;
      background-size: auto;
      pointer-events: none;
    }
    .dragonfly-bg {
      position: absolute;
      top: 7.5rem;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      pointer-events: none;
    }
    .dragonfly-bg img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top center;
      filter: invert(1);
      opacity: 0.2;
    }
    .content-layer {
      position: relative;
      z-index: 1;
    }
    .banner {
      position: relative;
      width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: #0f0f0f;
      background-image: url("bg-texture.png");
      background-repeat: repeat;
      overflow: hidden;
    }
    .banner a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 0 1rem;
      text-decoration: none;
      color: inherit;
    }
    .banner-words {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 50vw;
      max-width: 480px;
    }
    .banner-words img {
      width: 45%;
      height: auto;
      object-fit: contain;
    }
    .pdf-hint {
      background: rgba(31,31,31,0.98);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
    }
    .pdf-hint strong { color: #fff; }
    .navbar {
      background: rgba(15,15,15,0.98);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0.75rem 1rem;
    }
    .navbar-inner {
      max-width: 896px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .navbar-links { display: flex; gap: 1.5rem; }
    .navbar-links a { color: rgba(255,255,255,0.9); text-decoration: none; font-weight: 500; }
    .navbar-links a:hover { color: #fff; text-decoration: underline; }
    .container { max-width: 896px; margin: 0 auto; padding: 2rem 1rem 3rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin: 0 0 1.5rem; text-align: center; }
    .login-box {
      max-width: 24rem;
      margin: 0 auto 2rem;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(31,31,31,0.95);
    }
    .login-box h2 { font-size: 1.125rem; font-weight: 600; color: #fff; margin: 0 0 1rem; }
    .login-box input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      color: #fff;
      background: rgba(15,15,15,0.8);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      margin-bottom: 0.75rem;
    }
    .login-box input::placeholder { color: rgba(255,255,255,0.5); }
    .login-box input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.4);
    }
    .password-field { position: relative; margin-bottom: 0.75rem; }
    .password-field input { margin-bottom: 0; padding-right: 5.5rem; }
    .show-password-label {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
    }
    .show-password-label:hover { color: #fff; }
    .show-password-label input[type="checkbox"] { margin: 0; cursor: pointer; }
    .login-box button {
      width: 100%;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #0f0f0f;
      background: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: rgba(255,255,255,0.9); }
    .login-error { font-size: 0.875rem; color: #f87171; margin-top: 0.5rem; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); border: 0;
    }
    .media-content { display: none; }
    .media-content.visible { display: block; }
    .media-intro { color: rgba(255,255,255,0.8); margin-bottom: 1.5rem; font-size: 1rem; }
    .media-intro code { background: rgba(31,31,31,0.9); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; color: rgba(255,255,255,0.9); }
    .section-heading { font-size: 1.25rem; font-weight: 600; color: #fff; margin: 0 0 1rem; }
    .album-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .album-card {
      display: block;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(31,31,31,0.9);
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .album-card:hover { border-color: rgba(255,255,255,0.25); }
    .album-thumb {
      aspect-ratio: 16 / 10;
      background: rgba(31,31,31,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.3);
    }
    .album-info { padding: 1rem; }
    .album-info h3 { font-size: 1rem; font-weight: 600; color: #fff; margin: 0 0 0.25rem; }
    .album-info p { font-size: 0.875rem; color: rgba(255,255,255,0.7); margin: 0; }
    .footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(31,31,31,0.95);
      padding: 1.25rem 1rem;
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.7);
    }
    .footer img { height: 28px; width: auto; opacity: 0.8; filter: invert(1); }
    @media print {
      .pdf-hint, .navbar, .banner, .dragonfly-bg { display: none; }
      .login-box { display: none; }
      .media-content { display: block !important; }
    }
  </style>
</head>
<body>
  <div class="dragonfly-bg" aria-hidden="true"><img src="logo/dragonfly-bg.png" alt=""></div>
  <div class="bg-texture-overlay" aria-hidden="true"></div>
  <div class="content-layer">
  <header class="banner" role="banner">
    <a href="Camp-Fly-Home-Preview.html" aria-label="Camp Fly home">
      <span class="banner-words">
        <img src="logo/banner-camp.png" alt="Camp">
        <img src="logo/banner-fly.png" alt="Fly">
      </span>
    </a>
  </header>

  <header class="navbar">
    <div class="navbar-inner">
      <nav class="navbar-links">
        <a href="Camp-Fly-Home-Preview.html">Home</a>
        <a href="Camp-Fly-Preview.html">Burgin Initiation</a>
        <a href="Camp-Fly-Media-Preview.html">Media</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <h1>Camp media</h1>

    <div id="login-view" class="login-box">
      <h2>Enter password to view media</h2>
      <form id="media-login" novalidate>
        <label for="media-password" class="sr-only">Password</label>
        <div class="password-field">
          <input type="password" id="media-password" placeholder="Password" autocomplete="current-password" aria-label="Password">
          <label class="show-password-label" for="show-password">
            <input type="checkbox" id="show-password" aria-label="Show password">
            Show
          </label>
        </div>
        <p id="login-error" class="login-error" role="alert" aria-live="polite" style="display: none;"></p>
        <button type="submit">View media</button>
      </form>
    </div>

    <div id="media-content" class="media-content" aria-live="polite">
      <h2 class="section-heading">Albums by year</h2>
      <ul class="album-grid">
        <li>
          <a href="Camp-Fly-Media-2025.html" class="album-card" title="2025 photos">
            <div class="album-thumb" aria-hidden="true">📷</div>
            <div class="album-info">
              <h3>2025</h3>
              <p>Photos from 2025</p>
            </div>
          </a>
        </li>
        <li>
          <a href="Camp-Fly-Media-2024.html" class="album-card" title="2024 photos">
            <div class="album-thumb" aria-hidden="true">📷</div>
            <div class="album-info">
              <h3>2024</h3>
              <p>Photos from 2024</p>
            </div>
          </a>
        </li>
        <li>
          <a href="Camp-Fly-Media-2023.html" class="album-card" title="2023 photos">
            <div class="album-thumb" aria-hidden="true">📷</div>
            <div class="album-info">
              <h3>2023</h3>
              <p>Photos from 2023</p>
            </div>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <footer class="footer">
    <img src="logo/dragonfly-only.png" alt="">
    <p style="margin:0;">Camp Fly @ Burning Man</p>
  </footer>
  </div>

  <script>
    (function() {
      var PASSWORD = 'Iwillnotposttheseonsocialmedia';
      var form = document.getElementById('media-login');
      var loginView = document.getElementById('login-view');
      var mediaContent = document.getElementById('media-content');
      var errorEl = document.getElementById('login-error');
      var input = document.getElementById('media-password');
      var showCheckbox = document.getElementById('show-password');

      if (showCheckbox && input) {
        showCheckbox.addEventListener('change', function() {
          input.type = this.checked ? 'text' : 'password';
        });
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        errorEl.style.display = 'none';
        errorEl.textContent = '';
        var value = (input && input.value) ? input.value.trim() : '';
        if (value === PASSWORD) {
          loginView.style.display = 'none';
          mediaContent.classList.add('visible');
        } else {
          errorEl.textContent = 'Incorrect password. Try again.';
          errorEl.style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
